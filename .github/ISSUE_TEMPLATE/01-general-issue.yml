name: General issue
description: Ask a question or report a problem about a specific (set of) packages
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Please read the following points before filing an issue:

        * **Before reporting an issue**, check whether there are pinned/recent comments on the AUR and whether your request is really in-line with https://wiki.archlinux.org/title/PKGBUILD.
        * **For more general discussions and questions** about related topics such as mingw-w64 packaging in general, feel free to open or join a discussion on https://github.com/Martchus/PKGBUILDs/discussions.
        * **I cannot help with AUR helpers.** Please report problems with AUR helpers to their vendors.
        * **Only Arch Linux is supported.** Packages may not build on other distributions such as Manjaro.

  - type: textarea
    attributes:
      label: Relevant packages
      description: |
        List of packages:
    validations:
      required: true

  - type: textarea
    attributes:
      label: Build environment
      description: |
        Your modifications to the build environment (e.g. changes in `makepkg.conf`):
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: |
        Question/request or brief description of the problem:
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives or workarounds
      description: |
        Please describe any alternatives or workarounds you have considered and, possibly, rejected.

  - type: textarea
    attributes:
      label: Additional context
      description: |
        Add any other context or screenshots about the feature request here.
